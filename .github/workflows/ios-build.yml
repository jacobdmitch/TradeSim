name: iOS Build

# Compiles the TradeSim app on a macOS runner for the iOS Simulator.
# No code signing is required for a build check, so this works on any push/PR
# without provisioning profiles or secrets.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project TradeSim.xcodeproj \
            -scheme TradeSim \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
